<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICT Asset Management System for Organizations - Login</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, sans-serif;
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:400px;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0px 0px 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    color:#0d6efd;
}

p{
    text-align:center;
    color:gray;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#084298;
}

.footer{
    text-align:center;
    margin-top:15px;
    color:gray;
    font-size:13px;
}
</style>
</head>

<body>

<div class="login-container">
    <h2>ICT Asset Management System for Organisations</h2>
    <p><p>Enterprise IT Domain</p></p>

   <form action="warranty_dashboard.html">
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <div class="footer">
        Group 3 Project | Enterprise IT Domain
    </div>
</div>

</body>
</html>

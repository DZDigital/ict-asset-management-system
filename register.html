<!DOCTYPE html>
<html>
<head>
    <title>Register - ICT Asset Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card mx-auto p-4" style="max-width:500px;">
        <h2 class="text-center">Register</h2>
        <p class="text-center">ICT Asset Management System for Organizations</p>

        <input type="text" id="fullname" class="form-control mb-3" placeholder="Full Name">

        <input type="email" id="email" class="form-control mb-3" placeholder="Email">

        <input type="text" id="username" class="form-control mb-3" placeholder="Username">

        <input type="password" id="password" class="form-control mb-3" placeholder="Password">

        <button class="btn btn-primary w-100" onclick="registerUser()">Register</button>

        <p class="mt-3 text-center">
            Already have an account?
            <a href="login.html">Login</a>
        </p>
    </div>
</div>

<script>
function registerUser() {
    let fullname = document.getElementById("fullname").value;
    let email = document.getElementById("email").value;
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    localStorage.setItem("username", username);
    localStorage.setItem("password", password);

    alert("Registration Successful!");

    window.location.href = "login.html";
}
</script>

</body>
</html>
